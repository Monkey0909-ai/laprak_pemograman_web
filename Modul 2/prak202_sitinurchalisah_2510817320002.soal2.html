<html>
<head>
    <title>Mengubah Warna Link</title>

    <style>
        a:link {
            color: #000000;
            background-color: transparent;
            text-decoration: none;
        }

        a:visited {
            color: #000000;
            background-color: transparent;
            text-decoration: none;
        }

        a:hover {
            color: #ff0000;
            background-color: transparent;
            text-decoration: underline;
        }

        a:active {
            color: #000000;
            background-color: transparent;
            text-decoration: underline;
        }
    </style>

</head>

<body>
